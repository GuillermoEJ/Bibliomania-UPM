            height: 1px !important;
            margin: -1px !important;
            overflow: hidden !important;
            padding: 0 !important;
            position: absolute !important;
            width: 1px !important
        }

        blockquote,
        body,
        fieldset {
            margin: 0
        }

        .content,
        sub,
        sup {
            position: relative
        }

        .content,
        .grid__item--1\/1,
        blockquote,
        table {
            width: 100%
        }

        @keyframes fade-in {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes fade-zoom-out {
            from {
                opacity: 0;
                transform: scale(1.05)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes circle {
            0% {
                transform: scale(.6);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes value {
            0% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }

        @keyframes fade-in-extended {

            0%,
            75% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }

        @keyframes flickering {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .6
            }
        }
